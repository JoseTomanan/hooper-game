name: CI

# Why this exists
# ----------------
# The C# layer of a Godot 4 .NET project is an ordinary .NET assembly that
# references the engine API through the `Godot.NET.Sdk` NuGet package, so it
# compiles on a plain runner with no Godot editor installed.
#
# Crucially, the GAME project (HOOPER GAME.csproj) and the TEST project
# (tests/Hooper.Ball.Tests) are two SEPARATE compile surfaces — the game csproj
# excludes tests/**/*.cs, and the test csproj enables ImplicitUsings while the
# game csproj does not. That asymmetry means `dotnet test` alone can stay green
# while the game project fails to compile (e.g. a file using System.MathF with
# only `using Godot;` resolves in tests via the implicit global `using System;`
# but not in the game build). So we build the game project EXPLICITLY here —
# that is the guard `dotnet test` cannot provide.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Build the GAME project on its own compile surface. This is the step that
      # catches game-only compile errors the test project would mask.
      - name: Build game project
        run: dotnet build "HOOPER GAME.csproj" --configuration Debug

      # Build + run the deterministic ball / physics test suite.
      - name: Run tests
        run: dotnet test tests/Hooper.Ball.Tests/Hooper.Ball.Tests.csproj --configuration Debug

  # The headless integration harness (ADR-0016) — the third verification surface.
  # Unlike build-and-test (which only compiles C# and runs engine-FREE unit
  # tests), this job boots a REAL Godot .NET engine under --headless, loads a
  # real scene, pumps its fixed-tick physics loop, and reads pass/fail from the
  # scene's process exit code (GetTree().Quit). It reaches what unit tests
  # structurally cannot: scene loading, the Node lifecycle, and the live sim.
  #
  # This is the project's go/no-go bet (ADR-0016): if Godot cannot verify
  # headless on hosted CI, we fall back to a human feel gate + afk-only
  # auto-merge (ADR-0015 alternative 2). Kept a SEPARATE job so its slower,
  # flakier engine-boot profile doesn't contaminate the fast unit gate above.
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Install the .NET/Mono build of Godot. The version is given as a
      # GodotSharp version string and MUST match the Godot.NET.Sdk / GodotSharp
      # version the project pins (4.6.3) so the C# bindings line up.
      - name: Set up Godot (.NET)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: true
          include-templates: false

      # Generate the GodotSharp bindings + import the project (creates .godot/).
      # This first headless launch can return non-zero spuriously while it
      # bootstraps the .NET glue, so tolerate it — the real gate is the run step.
      - name: Generate .NET bindings & import project
        run: godot --headless --build-solutions --quit || exit 0

      # Explicitly build the game assembly so a genuine C# error surfaces here
      # rather than as a confusing "script not found" at scene-load time.
      - name: Build game assembly
        run: dotnet build "HOOPER GAME.csproj" --configuration Debug

      # Run the smoke scene headless. Godot exits with the code the scene passes
      # to GetTree().Quit(): 0 = PASS, 1 = FAIL. A crash (non 0/1) also fails the
      # job, which is correct — it means the harness itself broke.
      - name: Run headless integration smoke test
        run: godot --headless --path . res://tests/integration/SmokeTest.tscn

      # Assert that the three M10 defensive Input Map actions (def_steal,
      # def_block, def_contest) are registered in the live engine InputMap.
      # Checks InputMap.HasAction() for each — a bare headless load only proves
      # the INI parsed; a silent drop (malformed entry) would pass that and fail
      # here. Exits 0 = all present, 1 = any missing (ADR-0016 exit-code contract).
      - name: Run InputMap defensive-actions assertion
        run: godot --headless --path . res://tests/integration/InputMapDefensiveActionsTest.tscn

      # Steal TURNOVER mechanic, end to end (issue #96 remediation, ADR-0018).
      # Boots a real BallController + two PlayerControllers headless, drives the
      # deterministic tick clock, and asserts the server resolves a steal across
      # the WHOLE Active window (not just its entry tick — the merged #96 bug).
      # 'success' places the Active window so its entry tick is just below the
      # exposed band and a later Active tick lands in it: entry-tick-only code
      # whiffs (RED), per-Active-tick code steals→Loose (GREEN). 'whiff' places
      # the window entirely above the band and asserts the ball stays Dribbling
      # (guards against over-triggering). 'recovery-reset' (issue #176) runs the
      # same steal through to a completed scramble recovery and asserts the
      # dribble phase resets to 0 the instant the ball is re-caught, instead of
      # staying frozen at its in-band value — the fix that closes the
      # near-instant re-steal exploit a frozen phase enabled. Each exits
      # 0=PASS/1=FAIL (ADR-0016).
      - name: Run steal-turnover mechanic harness
        run: |
          godot --headless --path . res://tests/integration/StealTurnoverTest.tscn -- --harness-scenario=success
          godot --headless --path . res://tests/integration/StealTurnoverTest.tscn -- --harness-scenario=whiff
          godot --headless --path . res://tests/integration/StealTurnoverTest.tscn -- --harness-scenario=recovery-reset

      # Block TURNOVER mechanic, end to end (issue #98, ADR-0018 §2). Boots a
      # real BallController + two PlayerControllers headless, begins a REAL
      # JumpShot (shooter) and a REAL BlockMove (defender) through the SAME
      # BeginCommittedMove path production input reaches for both moves (see
      # BlockHarnessSeam), and asserts BallController.ResolveBlockAttempts's
      # full-interval-form overlap check against the LIVE engine state — the
      # pre-switch-plus-release-tick-top-up call ordering that makes "a
      # blocked shot cannot score" true. 'success'
      # places the defender's Active window so its entry tick lands exactly
      # on the shot's release tick: asserts the turnover completes (Loose ->
      # settled Held), the swat velocity (away from the rim, downward)
      # replaces the shot's original toward-the-rim trajectory, the defender
      # is last-toucher, the defender's machine ends up in Recovery, AND —
      # against the 'control-make' counterfactual below — that the score is
      # STILL 0-0 even generously past the tick an unblocked shot from this
      # setup would have scored on (not merely "unchanged by the time the
      # scramble settled"). 'success-lastactive' places the defender's Active
      # window so its LAST tick (not its first) lands on the release tick —
      # the exact case the post-switch release-tick top-up call exists for;
      # deleting that call fails this scenario deterministically. 'whiff'
      # places the Active window's entry tick EXACTLY on the vulnerable
      # window's exclusive end (the first tick the half-open interval
      # excludes, pinning the boundary itself rather than a tick safely past
      # it): asserts no turnover fires, the shot proceeds unblocked (state
      # stays InFlight), and the defender still pays Recovery for the miss.
      # 'control-make' never begins a BlockMove at all — the counterfactual
      # 'success' is checked against — and asserts the identical, unblocked
      # shot setup scores exactly once. 'control-make-default-geometry'
      # (issue #216 finding 3) is a control-make TWIN that skips the class's
      # explicit BoardCenter override, so it is the only scenario here
      # exercising BallController.BoardCenter's raw [Export] default rather
      # than an explicitly-set value — the every-other-scenario override
      # meant NOTHING in this file could ever notice a regression to that
      # default (issue #217 recurring undetected). Verified RED against the
      # pre-#217 default (0, 3.5, 0.3): times out at 0-0 (board intercepts the
      # make-arc); GREEN on the current derived default. All scenarios also
      # assert the ADR-0018 §3 frame-data invariant (BlockMove.ActiveFrames
      # <= BallController.BlockGraceTicks) against the LIVE ball node's
      # export, and fail fast (rather than timing out) if a frame-data retune
      # makes a scenario's computed defender-begin frame unschedulable.
      # 'out-of-range' (issue #214) proves the new proximity/reach gate:
      # ResolveBlockAttempts now ALSO requires DefensiveResolution.
      # WithinBlockReach (defender within the new BlockReachRadius export,
      # default 2.2m, XZ-only) in addition to the pre-existing timing overlap
      # — a spatially unconditioned block let a defender anywhere on the
      # court "block" a shot, deleting the spacing axis from the shot/block
      # duel (CLAUDE.md §1). 'out-of-range' reuses 'success''s EXACT
      # perfect-timing placement (ComputeDefenderBeginFrame's default branch)
      # but positions the defender ~6m from the shooter — outside the default
      # radius — so a whiff here can only be explained by the reach gate,
      # never by mistiming (which 'whiff' already covers). 'success' and
      # 'success-lastactive' and 'whiff' all now explicitly position their
      # defender 1m from the shooter (comfortably inside the default radius)
      # so the reach gate is a controlled constant for them, not an
      # accidental pass — the in-range control this new spatial axis is
      # checked against. Each exits 0=PASS/1=FAIL (ADR-0016).
      - name: Run block-turnover mechanic harness
        run: |
          godot --headless --path . res://tests/integration/BlockTurnoverTest.tscn -- --harness-scenario=success
          godot --headless --path . res://tests/integration/BlockTurnoverTest.tscn -- --harness-scenario=success-lastactive
          godot --headless --path . res://tests/integration/BlockTurnoverTest.tscn -- --harness-scenario=whiff
          godot --headless --path . res://tests/integration/BlockTurnoverTest.tscn -- --harness-scenario=out-of-range
          godot --headless --path . res://tests/integration/BlockTurnoverTest.tscn -- --harness-scenario=control-make
          godot --headless --path . res://tests/integration/BlockTurnoverTest.tscn -- --harness-scenario=control-make-default-geometry

      # Held-ball out-of-bounds turnover (issue #179, adjudicating hitl #119).
      # Boots a real BallController + two PlayerControllers headless and walks a
      # player past the court line, asserting BallController.ResolvePlayerOutOfBounds
      # (the surface unit tests cannot reach — it reads live player world
      # position). 'held-turnover' proves the holder crossing the line flips
      # possession; 'defender-exempt' proves the non-holder crossing it is a
      # no-op; 'both-oob' proves no 60Hz strobe when both players are OOB AND
      # pins the actual (intentional, documented) both-OOB no-op named in the
      # audit as the suspected "still broken" repro; 'wall-placement' parses
      # the live scenes/Main.tscn to assert the four Walls/WallCollision*
      # shapes sit outside CourtMin/CourtMax. Each exits 0=PASS/1=FAIL (ADR-0016).
      - name: Run OOB turnover harness
        run: |
          godot --headless --path . res://tests/integration/OobTurnoverTest.tscn -- --harness-scenario=held-turnover
          godot --headless --path . res://tests/integration/OobTurnoverTest.tscn -- --harness-scenario=defender-exempt
          godot --headless --path . res://tests/integration/OobTurnoverTest.tscn -- --harness-scenario=both-oob
          godot --headless --path . res://tests/integration/OobTurnoverTest.tscn -- --harness-scenario=wall-placement

      # Triple threat stance — Held-start possessions + dead-dribble rule
      # (issue #193, ADR-0008 amendment). Boots a real BallController + two
      # PlayerControllers headless and drives the actual production code path
      # end to end: asserts the tipoff lands in a fresh, LIVE Held possession
      # (not auto-chained into Dribbling); that TryStartDribble legitimately
      # resumes a dribble on stick intent; that beginning a JumpShot (the real
      # BeginCommittedMove path) cradles the dribble synchronously and sets
      # the dead-dribble flag; that a further TryStartDribble is then refused;
      # that a canceled pump-fake still leaves the player in dead Held; that a
      # dribble move (Crossover/Hesitation) is refused while holding a Held
      # ball, dead or live (#204 code-review fix — no burst, no HandSide
      # flip); and that an OOB turnover (ADR-0008, already proven by
      # OobTurnoverTest) resets the flag and starts the new holder's
      # possession live. 'production-drive' (#204 code-review fix) presses
      # REAL movement input (Input.ActionPress) and asserts the Held ->
      # Dribbling transition happens via the UNMODIFIED PlayerController.
      # CheckAutoStartDribble -> BallController.TryStartDribble production
      # path, not a direct test-only call into the ball. Each exits
      # 0=PASS/1=FAIL (ADR-0016).
      - name: Run triple-threat / dead-dribble harness
        run: |
          godot --headless --path . res://tests/integration/TripleThreatTest.tscn -- --harness-scenario=dead-dribble
          godot --headless --path . res://tests/integration/TripleThreatTest.tscn -- --harness-scenario=production-drive

      # Crossover authoritative ball transit — no teleport (issue #195).
      # Boots a real BallController + two PlayerControllers headless and
      # drives an actual Crossover through the real BeginCommittedMove path
      # (the same harness seam #193 added), waiting for the REAL
      # PlayerController.HandSide flip a Crossover's Active-entry produces.
      # 'crossover-sweep' samples the ball's authoritative lateral XZ offset
      # every tick from the flip onward and asserts it dips well below the
      # full HandOffset magnitude at some point (proves a real mid-body
      # transit, not a one-tick HandSign snap) before settling on the
      # opposite side. 'possession-change-no-sweep' walks the holder out of
      # bounds (the already-proven OOB turnover) and asserts the fresh
      # possession's hand reset NEVER activates a sweep
      # (BallController.SweepActiveForHarness stays false every tick) —
      # rule 2, a possession change snaps, it does not sweep.
      # 'remote-handside-sweep' drives the HandSide flip through the
      # broadcast-receive seam instead of the local Active-entry path —
      # the remote-client display role (#195 review fix 4, PR #208) that
      # the other two scenarios never reach. Each exits 0=PASS/1=FAIL
      # (ADR-0016).
      - name: Run crossover ball-sweep harness
        run: |
          godot --headless --path . res://tests/integration/CrossoverSweepTest.tscn -- --harness-scenario=crossover-sweep
          godot --headless --path . res://tests/integration/CrossoverSweepTest.tscn -- --harness-scenario=possession-change-no-sweep
          godot --headless --path . res://tests/integration/CrossoverSweepTest.tscn -- --harness-scenario=remote-handside-sweep

      # In-place pivot plant (issue #172, ADR-0010 amendment). Unit tests
      # (HeadingMathTests) already pin the pure HeadingMath.Step state machine;
      # this drives a REAL PlayerController through the REAL Input singleton and
      # the unmodified TickServerOwnPlayer -> SampleMoveInput -> Move() path,
      # proving the plant/pivot gate actually withholds MoveAndSlide()
      # displacement and that the >90° threshold, ~0.35s 180° completion time,
      # and the #172-retuned exports are all live in the shipped wiring, not
      # just correct in isolation. 'exports' checks BackTurnSlowFactor/
      # MaxTurnRateDeg/PivotThresholdDeg; 'flick-180' proves a released flick
      # keeps pivoting to completion with zero displacement and a ~0.35s
      # timing band; 'held-135' proves a sustained >90° hold stays planted
      # until reached, then resumes moving; 'no-plant-boundary' proves an
      # exactly-90° turn never plants; 'committed-cancel' proves starting a
      # committed move (def_steal) cancels an in-progress pivot immediately.
      # Each exits 0=PASS/1=FAIL (ADR-0016).
      - name: Run pivot-plant harness
        run: |
          godot --headless --path . res://tests/integration/PivotPlantTest.tscn -- --harness-scenario=exports
          godot --headless --path . res://tests/integration/PivotPlantTest.tscn -- --harness-scenario=flick-180
          godot --headless --path . res://tests/integration/PivotPlantTest.tscn -- --harness-scenario=held-135
          godot --headless --path . res://tests/integration/PivotPlantTest.tscn -- --harness-scenario=no-plant-boundary
          godot --headless --path . res://tests/integration/PivotPlantTest.tscn -- --harness-scenario=committed-cancel

      # Moving crossover — momentum-aware burst with left-stick exit (issue
      # #198, ADR-0003 amendment). CrossoverBurstMathTests already pin the
      # pure composition function; this drives a REAL PlayerController
      # through the REAL Input singleton and the unmodified TickServerOwnPlayer
      # -> SampleMoveInput -> TickCommittedMoveBehavior path, proving Startup's
      # GatherDecel genuinely bleeds (not hard-zeroes) momentum and that the
      # composed burst actually lands in Velocity. 'retains-speed' drives the
      # player to speed, throws a crossover with the left stick released to
      # neutral by Active-entry, and asserts speed never hits zero across
      # Startup+Active (the discriminator against the pre-#198 hard-zero
      # model). 'stationary-forward-exit' throws a crossover from a dead stop
      # with the left stick pushed toward the player's forward facing by
      # Active-entry, and asserts the burst gains a forward component —
      # impossible under the pre-#198 pure-lateral-only burst. Each exits
      # 0=PASS/1=FAIL (ADR-0016).
      # 'hesitation-still-hard-zeroes' is the regression guard for the ADR-0003
      # amendment's own scoping claim ("bounded... to the moving crossover
      # only") — a driving player who throws a Hesitation (not a Crossover)
      # must still plant to a hard instant zero, not gain GatherDecel's bleed.
      # 'remote-pending-stick' (code review, #198 fix round) covers the
      # SERVER's copy of a REMOTE player: a node named "2" (TickServerRemotePlayer
      # role) has its exit vector seeded into _pendingRawStick via the harness
      # seam instead of the local Input singleton, proving that path — not just
      # the own-player ReadInput() path the other scenarios exercise — reaches
      # CrossoverBurstMath correctly.
      - name: Run moving-crossover harness
        run: |
          godot --headless --path . res://tests/integration/MovingCrossoverTest.tscn -- --harness-scenario=retains-speed
          godot --headless --path . res://tests/integration/MovingCrossoverTest.tscn -- --harness-scenario=stationary-forward-exit
          godot --headless --path . res://tests/integration/MovingCrossoverTest.tscn -- --harness-scenario=hesitation-still-hard-zeroes
          godot --headless --path . res://tests/integration/MovingCrossoverTest.tscn -- --harness-scenario=remote-pending-stick

      # Behind-the-back (issue #194) — own CommittedMove subclass, shielded
      # transit, narrower exit cone. CrossoverBurstMathExitConeTests/
      # BehindTheBackTests (xUnit) already pin the pure cone-clamp math and
      # the move's class/frame-data contract; this drives the LIVE glue.
      # 'shielded-sweep' boots a real BallController + two PlayerControllers,
      # begins a real BehindTheBack through BeginCommittedMove, and asserts
      # the ball's forward offset goes NEGATIVE (genuinely behind the
      # holder's centerline) during the sweep, with
      # BallController.SweepIsBehindBodyForHarness true — the discriminator
      # against Crossover's in-front sweep. 'narrower-exit-cone' drives the
      # REAL SampleMoveInput -> RequestBeginMove("behindtheback") ->
      # TickCommittedMoveBehavior path with a PURE LATERAL left-stick exit —
      # exactly the input CrossoverBurstMathTests pins as producing zero
      # forward burst for a plain Crossover — and asserts a real forward
      # component appears, proving the move_size_up modifier + narrower cone
      # are wired end-to-end. 'dead-dribble-gate' proves BehindTheBack
      # respects the SAME Held-holder dead-dribble gate (#193) Crossover/
      # Hesitation use. Each exits 0=PASS/1=FAIL (ADR-0016).
      - name: Run behind-the-back harness
        run: |
          godot --headless --path . res://tests/integration/BehindTheBackTest.tscn -- --harness-scenario=shielded-sweep
          godot --headless --path . res://tests/integration/BehindTheBackTest.tscn -- --harness-scenario=narrower-exit-cone
          godot --headless --path . res://tests/integration/BehindTheBackTest.tscn -- --harness-scenario=dead-dribble-gate

      # Dual-instance harness, increment 1: two headless Godot processes complete
      # a real ENet handshake over localhost. The orchestrator launches a server
      # and a client of the same scene and reads the client's exit code. This is
      # the two-process capability the single-instance smoke test cannot cover —
      # the foundation the server-authoritative verifies (ADR-0002) build on.
      - name: Run dual-instance ENet handshake harness
        run: |
          chmod +x tests/integration/run-net-handshake.sh
          tests/integration/run-net-handshake.sh godot

      # Dual-instance harness, increment 2: the server (multiplayer authority)
      # broadcasts a strictly-increasing authoritative value to the client every
      # physics tick via RPC — the same ReceiveState cadence the real sim uses
      # (ADR-0002). The client passes only after receiving a sustained in-order
      # run, proving authoritative state actually crosses the wire, not just the
      # handshake. This is the mechanism every server-authoritative verify needs.
      - name: Run dual-instance authoritative state-sync harness
        run: |
          chmod +x tests/integration/run-net-state-sync.sh
          tests/integration/run-net-state-sync.sh godot

      # Dual-instance harness, increment 3: the SHIPPED netcode end-to-end. The
      # server boots via NetworkManager.StartDedicatedServer (the headless
      # authoritative-host path, ADR-0007, never before proven on CI — issue #32);
      # the client joins via NetworkManager.JoinGame; the server's SpawnPlayer +
      # the sibling MultiplayerSpawner replicate a server-authored player node to
      # the client, named by peer id (the identity contract). The client passes
      # only once it observes its own node appear. This is the existence-replication
      # channel every server-authoritative dual-instance verify builds on, proven
      # against the real game's NetworkManager rather than throwaway harness code.
      - name: Run dual-instance node-replication harness
        run: |
          chmod +x tests/integration/run-net-node-replication.sh
          tests/integration/run-net-node-replication.sh godot

      # Dual-instance harness: BehindTheBack broadcast-driven shielded sweep
      # (issue #212). The single-instance BehindTheBackTest cannot reach
      # PlayerController.DisplayMoveId()'s _serverMoveId branch — in one
      # process Multiplayer.IsServer() is unconditionally true, so every node
      # reads its LIVE local machine. Here the server (listen-server via
      # NetworkManager.HostGame, so it owns holder node "1") begins a real
      # BehindTheBack; the CLIENT process passes only if, on the SAME
      # live-sweep tick, its own locally-rendered ball flags the sweep
      # behind-body, the remote holder's DisplayMoveId() returns
      # "behindtheback" (the broadcast branch — the client's copy of the
      # opponent never advances a local machine), and the ball's forward
      # offset goes genuinely NEGATIVE behind the holder's centerline. The
      # client's exit code is the verdict (ADR-0016).
      - name: Run dual-instance behind-the-back sweep harness
        run: |
          chmod +x tests/integration/run-net-behindtheback-sweep.sh
          tests/integration/run-net-behindtheback-sweep.sh godot
