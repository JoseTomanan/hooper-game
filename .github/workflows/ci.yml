name: CI

# Why this exists
# ----------------
# The C# layer of a Godot 4 .NET project is an ordinary .NET assembly that
# references the engine API through the `Godot.NET.Sdk` NuGet package, so it
# compiles on a plain runner with no Godot editor installed.
#
# Crucially, the GAME project (HOOPER GAME.csproj) and the TEST project
# (tests/Hooper.Ball.Tests) are two SEPARATE compile surfaces — the game csproj
# excludes tests/**/*.cs, and the test csproj enables ImplicitUsings while the
# game csproj does not. That asymmetry means `dotnet test` alone can stay green
# while the game project fails to compile (e.g. a file using System.MathF with
# only `using Godot;` resolves in tests via the implicit global `using System;`
# but not in the game build). So we build the game project EXPLICITLY here —
# that is the guard `dotnet test` cannot provide.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Build the GAME project on its own compile surface. This is the step that
      # catches game-only compile errors the test project would mask.
      - name: Build game project
        run: dotnet build "HOOPER GAME.csproj" --configuration Debug

      # Build + run the deterministic ball / physics test suite.
      - name: Run tests
        run: dotnet test tests/Hooper.Ball.Tests/Hooper.Ball.Tests.csproj --configuration Debug

  # The headless integration harness (ADR-0016) — the third verification surface.
  # Unlike build-and-test (which only compiles C# and runs engine-FREE unit
  # tests), this job boots a REAL Godot .NET engine under --headless, loads a
  # real scene, pumps its fixed-tick physics loop, and reads pass/fail from the
  # scene's process exit code (GetTree().Quit). It reaches what unit tests
  # structurally cannot: scene loading, the Node lifecycle, and the live sim.
  #
  # This is the project's go/no-go bet (ADR-0016): if Godot cannot verify
  # headless on hosted CI, we fall back to a human feel gate + afk-only
  # auto-merge (ADR-0015 alternative 2). Kept a SEPARATE job so its slower,
  # flakier engine-boot profile doesn't contaminate the fast unit gate above.
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Install the .NET/Mono build of Godot. The version is given as a
      # GodotSharp version string and MUST match the Godot.NET.Sdk / GodotSharp
      # version the project pins (4.6.3) so the C# bindings line up.
      - name: Set up Godot (.NET)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.3
          use-dotnet: true
          include-templates: false

      # Generate the GodotSharp bindings + import the project (creates .godot/).
      # This first headless launch can return non-zero spuriously while it
      # bootstraps the .NET glue, so tolerate it — the real gate is the run step.
      - name: Generate .NET bindings & import project
        run: godot --headless --build-solutions --quit || exit 0

      # Explicitly build the game assembly so a genuine C# error surfaces here
      # rather than as a confusing "script not found" at scene-load time.
      - name: Build game assembly
        run: dotnet build "HOOPER GAME.csproj" --configuration Debug

      # Run the smoke scene headless. Godot exits with the code the scene passes
      # to GetTree().Quit(): 0 = PASS, 1 = FAIL. A crash (non 0/1) also fails the
      # job, which is correct — it means the harness itself broke.
      - name: Run headless integration smoke test
        run: godot --headless --path . res://tests/integration/SmokeTest.tscn

      # Assert that the three M10 defensive Input Map actions (def_steal,
      # def_block, def_contest) are registered in the live engine InputMap.
      # Checks InputMap.HasAction() for each — a bare headless load only proves
      # the INI parsed; a silent drop (malformed entry) would pass that and fail
      # here. Exits 0 = all present, 1 = any missing (ADR-0016 exit-code contract).
      - name: Run InputMap defensive-actions assertion
        run: godot --headless --path . res://tests/integration/InputMapDefensiveActionsTest.tscn

      # Steal TURNOVER mechanic, end to end (issue #96 remediation, ADR-0018).
      # Boots a real BallController + two PlayerControllers headless, drives the
      # deterministic tick clock, and asserts the server resolves a steal across
      # the WHOLE Active window (not just its entry tick — the merged #96 bug).
      # 'success' places the Active window so its entry tick is just below the
      # exposed band and a later Active tick lands in it: entry-tick-only code
      # whiffs (RED), per-Active-tick code steals→Loose (GREEN). 'whiff' places
      # the window entirely above the band and asserts the ball stays Dribbling
      # (guards against over-triggering). 'recovery-reset' (issue #176) runs the
      # same steal through to a completed scramble recovery and asserts the
      # dribble phase resets to 0 the instant the ball is re-caught, instead of
      # staying frozen at its in-band value — the fix that closes the
      # near-instant re-steal exploit a frozen phase enabled. Each exits
      # 0=PASS/1=FAIL (ADR-0016).
      - name: Run steal-turnover mechanic harness
        run: |
          godot --headless --path . res://tests/integration/StealTurnoverTest.tscn -- --harness-scenario=success
          godot --headless --path . res://tests/integration/StealTurnoverTest.tscn -- --harness-scenario=whiff
          godot --headless --path . res://tests/integration/StealTurnoverTest.tscn -- --harness-scenario=recovery-reset

      # Held-ball steal window (issue #206, ADR-0018 Amendment 2026-07-19,
      # human-decided Option A "pump-fake window"). StealTurnoverTest above
      # only ever exercises a Dribbling ball — before this fix, a Held ball
      # (the state a JumpShot's cradle synchronously puts it in) was total
      # steal sanctuary, letting a holder mash the pump-fake to dodge any
      # steal read on reaction with zero downside. 'held-vulnerable' schedules
      # a real StealMove's Active window generously inside a real JumpShot's
      # Startup and asserts the turnover connects (ball goes Loose, defender
      # is last toucher). 'held-immune-outside-window' is the CONTROL: the
      # identical defender StealMove completes ENTIRELY (including its own
      # Recovery) before the holder ever begins a JumpShot, so
      # HeldStealVulnerableWindow is null the whole time — the steal must
      # never connect and the ball must stay Held (without this control,
      # 'held-vulnerable' passing would be equally consistent with a broken
      # setup that always reports a turnover). 'pumpfake-now-exposed' is the
      # HEADLINE scenario: it reproduces the historical degenerate exchange
      # verbatim — a steal timed against a LIVE DRIBBLE, the holder cradling
      # into Held before the defender's Active window opens (evading the old
      # Dribbling-only check entirely), then pump-faking the shot away — and
      # asserts the turnover connects anyway. All three were proven RED
      # against the pre-#206 ResolveStealAttempts/BallStateMachine.GoLoose()
      # and GREEN after (PR #206 body). Each exits 0=PASS/1=FAIL (ADR-0016).
      - name: Run held-ball steal window harness
        run: |
          godot --headless --path . res://tests/integration/HeldStealTest.tscn -- --harness-scenario=held-vulnerable
          godot --headless --path . res://tests/integration/HeldStealTest.tscn -- --harness-scenario=held-immune-outside-window
          godot --headless --path . res://tests/integration/HeldStealTest.tscn -- --harness-scenario=pumpfake-now-exposed

      # Transit (crossover-sweep) steal window (issue #196, ADR-0018 Amendment
      # 2026-07-20). StealTurnoverTest above only ever checks the live-dribble
      # two-axis (phase+hand) window; before this fix, a crossover's mid-body
      # ball transit had NO spatial term at all, and — worse — HandSide flips
      # to the new hand the instant Active begins while the ball is still
      # visibly sweeping across on the OLD side, so a defender reaching for
      # exactly where the ball visibly is got refused on the hand axis.
      # 'transit-steal' is the HEADLINE: the defender's StealMove targets the
      # holder's OLD hand, scheduled so the crossover's hand-flip completes
      # several ticks before the defender's Active window even opens — the
      # normal window's side axis is guaranteed to fail for the WHOLE run —
      # yet the turnover connects anyway because the defender sits within
      # StealReachRadius of the swept ball's authoritative GlobalPosition
      # during the live #195 sweep. 'out-of-reach-recovery' is the CONTROL:
      # identical setup, defender placed far outside reach — the steal must
      # never connect, the ball must stay Dribbling, the defender's StealMove
      # must expire naturally into Recovery, and the #100 whiff-punish beaten
      # window must fire (without this control, 'transit-steal' passing would
      # be equally consistent with "any steal always connects regardless of
      # reach"). 'normal-window-unchanged' is a second CONTROL guarding the
      # union itself: a plain live-dribble steal with a correctly-matched
      # hand and no crossover in play must still connect via the original
      # window (a) branch, unaffected by the added `||`. All three were
      # proven RED against the pre-#196 ResolveDribblingStealAttempts
      # ('transit-steal' fails — ball stays Dribbling, no turnover; the two
      # controls are unaffected by the fix either way, by design) and GREEN
      # after (PR body). Each exits 0=PASS/1=FAIL (ADR-0016).
      - name: Run transit steal window harness
        run: |
          godot --headless --path . res://tests/integration/TransitStealTest.tscn -- --harness-scenario=transit-steal
          godot --headless --path . res://tests/integration/TransitStealTest.tscn -- --harness-scenario=out-of-reach-recovery
          godot --headless --path . res://tests/integration/TransitStealTest.tscn -- --harness-scenario=normal-window-unchanged

      # Transit steal window coverage for the NON-crossover sweep paths
      # (issue #261, a #196 follow-up). AdvanceHandSweep (BallController.cs)
      # drives the SAME _sweepActive flag for EVERY sweep move — Crossover,
      # BehindTheBack, BetweenTheLegs, and Spin's BodyShield sweep — so
      # ResolveDribblingStealAttempts' transit window already applied to all
      # of them; the gap this closes is COVERAGE (only Crossover had a
      # dedicated scenario), not a behavior change. Each pair below reuses
      # the SAME headline/control shape as transit-steal/out-of-reach-
      # recovery above (see TransitStealTest.cs's class doc and
      # ComputeStealBeginFrameAfterFlip), with a discriminator RE-DERIVED
      # per move rather than copy-pasted:
      #   - transit-steal-behind-the-back / out-of-reach-recovery-behind-
      #     the-back and transit-steal-between-the-legs / out-of-reach-
      #     recovery-between-the-legs: BehindTheBack/BetweenTheLegs both
      #     flip HandSide on JustEnteredActive (the same tick Crossover
      #     does) and share Crossover's exact Startup/Active frame counts,
      #     so the same "old-hand-targeted, mistimed-for-the-normal-window"
      #     schedule discriminates them too — computed from each move's own
      #     LIVE DefaultFrameData, not hardcoded, so a future #238 retune
      #     that diverges their timing from Crossover's fails loud instead
      #     of going vacuous.
      #   - transit-steal-spin / out-of-reach-recovery-spin: Spin flips
      #     HandSide on its LAST Active tick, not JustEnteredActive (see
      #     Spin's class doc's "swap at the END" section) — a genuinely
      #     different flip point, so this pair schedules the steal's Active
      #     window against THAT later flip instead of assuming Crossover's
      #     timing.
      # All six scenarios were proven RED by temporarily neutering
      # BallController's transitWindowSucceeds term (forcing it false) —
      # every "transit-steal-*" headline failed (ball stayed Dribbling, no
      # turnover) while the fix was disabled — and GREEN with the term
      # restored (PR body). Each exits 0=PASS/1=FAIL (ADR-0016).
      - name: Run transit steal window harness (non-crossover sweep paths)
        run: |
          godot --headless --path . res://tests/integration/TransitStealTest.tscn -- --harness-scenario=transit-steal-behind-the-back
          godot --headless --path . res://tests/integration/TransitStealTest.tscn -- --harness-scenario=out-of-reach-recovery-behind-the-back
          godot --headless --path . res://tests/integration/TransitStealTest.tscn -- --harness-scenario=transit-steal-between-the-legs
          godot --headless --path . res://tests/integration/TransitStealTest.tscn -- --harness-scenario=out-of-reach-recovery-between-the-legs
          godot --headless --path . res://tests/integration/TransitStealTest.tscn -- --harness-scenario=transit-steal-spin
          godot --headless --path . res://tests/integration/TransitStealTest.tscn -- --harness-scenario=out-of-reach-recovery-spin

      # Steal aim→hand FACING transform (issue #254). StealTurnoverTest above
      # isolates the TIMING axis only — both its players sit at the
      # spawn-default Heading 0 throughout, so a regression in the aim→hand
      # mapping's relative-heading transform could never fail it. This harness
      # derives TargetHand from real aim input (BeginStealFromAimForHarness,
      # the same production HandStateResolver.TargetHandFromAim mapping
      # SampleMoveInput/ApplyRequestedMove both call) at a ~180° relative
      # heading (face-to-face — the exact #254 repro) and at ~0° (side-by-side
      # control, proving the fix is a no-op there, not a blanket inversion).
      # Each exits 0=PASS/1=FAIL (ADR-0016).
      - name: Run steal aim-to-hand facing-mapping harness
        run: |
          godot --headless --path . res://tests/integration/StealFacingMappingTest.tscn -- --harness-scenario=face-to-face
          godot --headless --path . res://tests/integration/StealFacingMappingTest.tscn -- --harness-scenario=side-by-side

      # Block TURNOVER mechanic, end to end (issue #98, ADR-0018 §2). Boots a
      # real BallController + two PlayerControllers headless, begins a REAL
      # JumpShot (shooter) and a REAL BlockMove (defender) through the SAME
      # BeginCommittedMove path production input reaches for both moves (see
      # BlockHarnessSeam), and asserts BallController.ResolveBlockAttempts's
      # full-interval-form overlap check against the LIVE engine state — the
      # pre-switch-plus-release-tick-top-up call ordering that makes "a
      # blocked shot cannot score" true. 'success'
      # places the defender's Active window so its entry tick lands exactly
      # on the shot's release tick: asserts the turnover completes (Loose ->
      # settled Held), the swat velocity (away from the rim, downward)
      # replaces the shot's original toward-the-rim trajectory, the defender
      # is last-toucher, the defender's machine ends up in Recovery, AND —
      # against the 'control-make' counterfactual below — that the score is
      # STILL 0-0 even generously past the tick an unblocked shot from this
      # setup would have scored on (not merely "unchanged by the time the
      # scramble settled"). 'success-lastactive' places the defender's Active
      # window so its LAST tick (not its first) lands on the release tick —
      # the exact case the post-switch release-tick top-up call exists for;
      # deleting that call fails this scenario deterministically. 'whiff'
      # places the Active window's entry tick EXACTLY on the vulnerable
      # window's exclusive end (the first tick the half-open interval
      # excludes, pinning the boundary itself rather than a tick safely past
      # it): asserts no turnover fires, the shot proceeds unblocked (state
      # stays InFlight), and the defender still pays Recovery for the miss.
      # 'control-make' never begins a BlockMove at all — the counterfactual
      # 'success' is checked against — and asserts the identical, unblocked
      # shot setup scores exactly once. 'control-make-default-geometry'
      # (issue #216 finding 3) is a control-make TWIN that skips the class's
      # explicit BoardCenter override, so it is the only scenario here
      # exercising BallController.BoardCenter's raw [Export] default rather
      # than an explicitly-set value — the every-other-scenario override
      # meant NOTHING in this file could ever notice a regression to that
      # default (issue #217 recurring undetected). Verified RED against the
      # pre-#217 default (0, 3.5, 0.3): times out at 0-0 (board intercepts the
      # make-arc); GREEN on the current derived default. All scenarios also
      # assert the ADR-0018 §3 frame-data invariant (BlockMove.ActiveFrames
      # <= BallController.BlockGraceTicks) against the LIVE ball node's
      # export, and fail fast (rather than timing out) if a frame-data retune
      # makes a scenario's computed defender-begin frame unschedulable.
      # 'out-of-range' (issue #214) proves the new proximity/reach gate:
      # ResolveBlockAttempts now ALSO requires DefensiveResolution.
      # WithinBlockReach (defender within the new BlockReachRadius export,
      # default 2.2m, XZ-only) in addition to the pre-existing timing overlap
      # — a spatially unconditioned block let a defender anywhere on the
      # court "block" a shot, deleting the spacing axis from the shot/block
      # duel (CLAUDE.md §1). 'out-of-range' reuses 'success''s EXACT
      # perfect-timing placement (ComputeDefenderBeginFrame's default branch)
      # but positions the defender ~6m from the shooter — outside the default
      # radius — so a whiff here can only be explained by the reach gate,
      # never by mistiming (which 'whiff' already covers). 'success' and
      # 'success-lastactive' and 'whiff' all now explicitly position their
      # defender 1m from the shooter (comfortably inside the default radius)
      # so the reach gate is a controlled constant for them, not an
      # accidental pass — the in-range control this new spatial axis is
      # checked against. Each exits 0=PASS/1=FAIL (ADR-0016).
      - name: Run block-turnover mechanic harness
        run: |
          godot --headless --path . res://tests/integration/BlockTurnoverTest.tscn -- --harness-scenario=success
          godot --headless --path . res://tests/integration/BlockTurnoverTest.tscn -- --harness-scenario=success-lastactive
          godot --headless --path . res://tests/integration/BlockTurnoverTest.tscn -- --harness-scenario=whiff
          godot --headless --path . res://tests/integration/BlockTurnoverTest.tscn -- --harness-scenario=out-of-range
          godot --headless --path . res://tests/integration/BlockTurnoverTest.tscn -- --harness-scenario=control-make
          godot --headless --path . res://tests/integration/BlockTurnoverTest.tscn -- --harness-scenario=control-make-default-geometry

      # Layup / rim-finish committed move (issue #229, ADR-0022 — M9's
      # rim-finishing vertical, first leaf). LayupTests/LayupRangeResolverTests/
      # JumpShotReleaseResolverTests (xUnit) already pin the pure frame-data
      # contract, the range-selection decision, and the release-resolver
      # extension; this drives the LIVE glue: a real Layup, begun through the
      # SAME BeginCommittedMove path production input reaches, actually
      # releases and scores through the UNCHANGED ShotScatter -> ShotArc ->
      # RimBackboard chain (no parallel accuracy formula, ADR-0022's own
      # claim). 'uncontested-make' proves that end to end with clean geometry.
      # 'block-success' proves the EXISTING block timing window (#98/#214)
      # resolves against a Layup's Active window exactly as it already does
      # against a JumpShot — no new defensive primitive. 'block-whiff' is the
      # control 'block-success' is checked against: a mistimed block leaves
      # the layup completely unaffected.
      #
      # The three 'range-gate-*' scenarios (issue #236, ADR-0023) prove the
      # SERVER-SIDE range gate that decides WHETHER a client's "layup" request
      # begins a Layup at all — upstream of the moves the other three exercise.
      # They drive PlayerController.RequestMoveForHarness (the shipped
      # ApplyRequestedMove RPC dispatch, minus only sender-id authorization).
      # 'range-gate-inside' (inside LayupRange) and 'range-gate-tolerated'
      # (outside LayupRange but inside LayupRange+LayupRangeNetTolerance — the
      # exact band #236 was dropping) must BEGIN a layup; 'range-gate-rejected'
      # (past the widened gate) must begin NOTHING — the REQUIRED control and
      # the anti-tamper property itself (a client claiming a layup from across
      # the court gets nothing, and that reject is safe because it leaves the
      # server Inactive for ShouldForceInactive to reconcile). Distances are
      # derived from the LIVE LayupRange/tolerance exports, so #238's retune
      # re-derives them rather than pinning a stale 4.0. Each exits
      # 0=PASS/1=FAIL (ADR-0016).
      - name: Run layup / rim-finish harness
        run: |
          godot --headless --path . res://tests/integration/LayupTest.tscn -- --harness-scenario=uncontested-make
          godot --headless --path . res://tests/integration/LayupTest.tscn -- --harness-scenario=block-success
          godot --headless --path . res://tests/integration/LayupTest.tscn -- --harness-scenario=block-whiff
          godot --headless --path . res://tests/integration/LayupTest.tscn -- --harness-scenario=range-gate-inside
          godot --headless --path . res://tests/integration/LayupTest.tscn -- --harness-scenario=range-gate-tolerated
          godot --headless --path . res://tests/integration/LayupTest.tscn -- --harness-scenario=range-gate-rejected

      # Euro-step lateral gather (issue #231, ADR-0022). Proves the euro-step
      # as a distinct server-authoritative committed move that laterally
      # displaces the drive-gather launch point, then chains into #229's Layup
      # (the euro-step itself never releases the ball — the finish is a
      # separate, client-predicted/server-gated Layup, per the proven
      # gather-to-layup-chain precedent and the ADR-0023 moveId invariant).
      # 'euro-step-beats-committed-defender' plants a REAL BlockMove defender
      # out-of-reach of the laterally displaced launch but in-reach of the
      # ORIGINAL straight-drive line (both distances derived from the LIVE
      # BlockReachRadius export, not a hardcoded literal), timed so the block's
      # Active window overlaps the chained layup's release — and asserts the
      # score lands AND the reach premises held (the defender genuinely
      # committed to the line the euro-step evaded). 'euro-step-read-still-
      # contests' is the REQUIRED control (ADR-0016 / "every X-didn't-happen
      # assertion needs a control"): a defender that READS the hop and
      # repositions into reach of the displaced launch, with timing held
      # identical — position is the sole discriminator — turns the ball over,
      # proving the make in the first scenario is a real evasion, not an
      # always-open layup. 'euro-step-whiff-recovery' begins the euro-step and
      # attempts to chain the Layup during its Recovery phase: the finish must
      # be REFUSED (a committed move can't cancel out of Recovery), proving the
      # displacement is a real committed-move body, not a free dodge (ADR-0003).
      # Each exits 0=PASS/1=FAIL (ADR-0016).
      - name: Run euro-step harness
        run: |
          godot --headless --path . res://tests/integration/EuroStepTest.tscn -- --harness-scenario=euro-step-beats-committed-defender
          godot --headless --path . res://tests/integration/EuroStepTest.tscn -- --harness-scenario=euro-step-read-still-contests
          godot --headless --path . res://tests/integration/EuroStepTest.tscn -- --harness-scenario=euro-step-whiff-recovery

      # Jab step — triple threat's stance bait (issue #200). Unit tests
      # already pin the pure legality gate (JabStepLegalityResolverTests.cs)
      # and the frame-data/lifecycle contract (JabStepTests.cs); this proves
      # the LIVE engine glue: a real jab, begun through the SAME
      # BeginCommittedMove choke point production input reaches, actually
      # leaves HasDribbled/BallState/HandSide/GlobalPosition untouched across
      # its full lifecycle, and is refused outright while Dribbling.
      # 'legal-held' begins the jab from a FRESH live Held possession and
      # proves the full lifecycle produces no state change / no hand swap /
      # no burst displacement, THEN begins a control JumpShot from the same
      # (now Inactive) state that DOES flip HasDribbled true — the required
      # control proving the earlier "stayed false" was a real observation,
      # not a harness premise that could never fail. 'legal-dead-held' cradles
      # a dribble first (JumpShot begin -> feint away -> wait for Recovery to
      # elapse, same setup as the triple-threat harness's dead-dribble step),
      # then proves the jab ALSO begins from that DEAD Held possession and
      # leaves HasDribbled untouched (still true, not reset). 'illegal-
      # dribbling' proves a jab is refused outright from a live Dribbling
      # possession, then begins a control Hesitation (legal from Dribbling,
      # #86) from the SAME state — the control proving the refusal is
      # jab-specific, not "nothing can begin while Dribbling." Each exits
      # 0=PASS/1=FAIL (ADR-0016).
      - name: Run jab-step harness
        run: |
          godot --headless --path . res://tests/integration/JabStepTest.tscn -- --harness-scenario=legal-held
          godot --headless --path . res://tests/integration/JabStepTest.tscn -- --harness-scenario=legal-dead-held
          godot --headless --path . res://tests/integration/JabStepTest.tscn -- --harness-scenario=illegal-dribbling

      # In-and-out — the crossover's twin, same telegraph, no hand swap
      # (issue #202, ADR-0003 amendment). Unit tests already pin the pure
      # frame-data/identity contract (InAndOutTests.cs), the gesture-meaning
      # composition, and the GestureKind rename
      # (RightStickGestureRecognizerTests.cs); this proves the LIVE engine
      # glue. 'quick-return-empty-hand' drives REAL synthetic aim-stick input
      # (Input.ActionPress, no harness seam) through the actual
      # RightStickGestureRecognizer -> SampleMoveInput dispatch: a quick
      # flick-and-return toward the empty hand begins a real InAndOut, runs
      # its full lifecycle, THEN drives the SAME flick HELD past the window —
      # the required control proving a Crossover begins instead, so the
      # retarget is quick-return-specific, not a change to the held gesture.
      # 'quick-return-ball-hand' is the AC-8 twin: flick toward the BALL hand
      # begins a Hesitation via the quick-return gesture, then proves the
      # SAME flick HELD ALSO begins a Hesitation — identical outcome either
      # way, per the issue's 2x2 gesture table. 'handside-unchanged' proves
      # InAndOut leaves HandSide untouched across its full lifecycle, THEN
      # begins a control Crossover from the same hand that DOES flip it — the
      # required control proving the "unchanged" observation isn't vacuous.
      # 'fallback-toward-ball-hand' proves the stationary+neutral-exit
      # fallback burst travels toward the BALL hand (the negated flick sign),
      # THEN proves a control Crossover under IDENTICAL conditions bursts the
      # OPPOSITE way (toward the empty hand) — pinning the negation is
