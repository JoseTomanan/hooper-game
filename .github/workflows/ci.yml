      # Moving crossover — momentum-aware burst with left-stick exit (issue
      # #198, ADR-0003 amendment). CrossoverBurstMathTests already pin the
      # pure composition function; this drives a REAL PlayerController
      # through the REAL Input singleton and the unmodified TickServerOwnPlayer
      # -> SampleMoveInput -> TickCommittedMoveBehavior path, proving Startup's
      # GatherDecel genuinely bleeds (not hard-zeroes) momentum and that the
      # composed burst actually lands in Velocity. 'retains-speed' drives the
      # player to speed, throws a crossover with the left stick released to
      # neutral by Active-entry, and asserts speed never hits zero across
      # Startup+Active (the discriminator against the pre-#198 hard-zero
      # model). 'stationary-forward-exit' throws a crossover from a dead stop
      # with the left stick pushed toward the player's forward facing by
      # Active-entry, and asserts the burst gains a forward component —
      # impossible under the pre-#198 pure-lateral-only burst. Each exits
      # 0=PASS/1=FAIL (ADR-0016).
      # 'hesitation-still-hard-zeroes' is the regression guard for the ADR-0003
      # amendment's own scoping claim ("bounded... to the moving crossover
      # only") — a driving player who throws a Hesitation (not a Crossover)
      # must still plant to a hard instant zero, not gain GatherDecel's bleed.
      # 'remote-pending-stick' (code review, #198 fix round) covers the
      # SERVER's copy of a REMOTE player: a node named "2" (TickServerRemotePlayer
      # role) has its exit vector seeded into _pendingRawStick via the harness
      # seam instead of the local Input singleton, proving that path — not just
      # the own-player ReadInput() path the other scenarios exercise — reaches
      # CrossoverBurstMath correctly.
      - name: Run moving-crossover harness
        run: |
          godot --headless --path . res://tests/integration/MovingCrossoverTest.tscn -- --harness-scenario=retains-speed
          godot --headless --path . res://tests/integration/MovingCrossoverTest.tscn -- --harness-scenario=stationary-forward-exit
          godot --headless --path . res://tests/integration/MovingCrossoverTest.tscn -- --harness-scenario=hesitation-still-hard-zeroes
          godot --headless --path . res://tests/integration/MovingCrossoverTest.tscn -- --harness-scenario=remote-pending-stick

      # Behind-the-back (issue #194) — own CommittedMove subclass, shielded
      # transit, narrower exit cone. CrossoverBurstMathExitConeTests/
      # BehindTheBackTests (xUnit) already pin the pure cone-clamp math and
      # the move's class/frame-data contract; this drives the LIVE glue.
      # 'shielded-sweep' boots a real BallController + two PlayerControllers,
      # begins a real BehindTheBack through BeginCommittedMove, and asserts
      # the ball's forward offset goes NEGATIVE (genuinely behind the
      # holder's centerline) during the sweep, with
      # BallController.SweepIsBehindBodyForHarness true — the discriminator
      # against Crossover's in-front sweep. 'narrower-exit-cone' drives the
      # REAL SampleMoveInput -> RequestBeginMove("behindtheback") ->
      # TickCommittedMoveBehavior path with a PURE LATERAL left-stick exit —
      # exactly the input CrossoverBurstMathTests pins as producing zero
      # forward burst for a plain Crossover — and asserts a real forward
      # component appears, proving the move_size_up modifier + narrower cone
      # are wired end-to-end. 'dead-dribble-gate' proves BehindTheBack
      # respects the SAME Held-holder dead-dribble gate (#193) Crossover/
      # Hesitation use. Each exits 0=PASS/1=FAIL (ADR-0016).
      - name: Run behind-the-back harness
        run: |
          godot --headless --path . res://tests/integration/BehindTheBackTest.tscn -- --harness-scenario=shielded-sweep
          godot --headless --path . res://tests/integration/BehindTheBackTest.tscn -- --harness-scenario=narrower-exit-cone
          godot --headless --path . res://tests/integration/BehindTheBackTest.tscn -- --harness-scenario=dead-dribble-gate

      # Between-the-legs (issue #199) — own CommittedMove subclass, the
      # "balanced midpoint" of the crossover family. BetweenTheLegsTests/
      # CrossoverBallSweepTests (xUnit) already pin the pure frame-data
      # contract and the ThroughLegs forward-offset formula; this drives the
      # LIVE glue. 'through-legs-dip' boots a real BallController + two
      # PlayerControllers, begins a real BetweenTheLegs through
      # BeginCommittedMove, and asserts the ball's world-space Y drops close
      # to the floor (BetweenTheLegsDipDepth) with
      # BallController.SweepPathForHarness == ThroughLegs, WHILE the forward
      # offset stays >= 0 throughout — the discriminator against
      # BehindTheBack's sweep, which goes negative instead.
      # 'finesse-selects-betweenthelegs' drives the REAL SampleMoveInput ->
      # RequestBeginMove("betweenthelegs") -> TickCommittedMoveBehavior path
      # holding "move_finesse" (not "move_size_up") during the flick, and
      # asserts DisplayMoveId() reports "betweenthelegs" once Active begins —
      # proving the move_finesse modifier and RPC dispatch are wired
      # end-to-end, distinct from both Crossover and BehindTheBack.
      # 'dead-dribble-gate' proves BetweenTheLegs respects the SAME
      # Held-holder dead-dribble gate (#193) Crossover/Hesitation/
      # BehindTheBack use. Each exits 0=PASS/1=FAIL (ADR-0016).
      - name: Run between-the-legs harness
        run: |
          godot --headless --path . res://tests/integration/BetweenTheLegsTest.tscn -- --harness-scenario=through-legs-dip
          godot --headless --path . res://tests/integration/BetweenTheLegsTest.tscn -- --harness-scenario=finesse-selects-betweenthelegs
          godot --headless --path . res://tests/integration/BetweenTheLegsTest.tscn -- --harness-scenario=dead-dribble-gate

      # Step-back + retreat dribble (issue #197) — the vertical right-stick
      # gesture pair. RightStickGestureRecognizerTests/StepBackBurstMathTests/
      # StepBackTests/RetreatDribbleTests (xUnit) already pin the pure
      # recognizer, burst math, and frame-data contracts; this drives the LIVE
      # glue. 'step-back-gathers' begins a real StepBack through
      # BeginCommittedMove off a live dribble and asserts the Active-entry
      # gather actually reaches dead Held (state=Held, HasDribbled=true) with
      # a nonzero backward burst on the holder's Velocity.
      # 'retreat-dribble-no-gather' is the CONTROL for that assertion — the
      # SAME live-dribble setup with a RetreatDribble instead, asserting the
      # ball stays Dribbling and HasDribbled stays false through the move's
      # ENTIRE lifecycle (guards against a bug that made every committed move
      # gather). 'retreat-dribble-dead-dribble-gate' proves RetreatDribble
      # respects the SAME Held-holder gate Crossover/Hesitation/BehindTheBack
      # use. Each exits 0=PASS/1=FAIL (ADR-0016).
      - name: Run step-back / retreat-dribble harness
        run: |
          godot --headless --path . res://tests/integration/StepBackTest.tscn -- --harness-scenario=step-back-gathers
          godot --headless --path . res://tests/integration/StepBackTest.tscn -- --harness-scenario=retreat-dribble-no-gather
          godot --headless --path . res://tests/integration/StepBackTest.tscn -- --harness-scenario=retreat-dribble-dead-dribble-gate

      # Drive-gather (issue #230, ADR-0022 — M9's rim-finishing vertical,
      # second leaf). DriveGatherTests/DriveGatherMathTests (xUnit) already
      # pin the pure frame-data contract and the steering/burst math; this
      # drives the LIVE glue. 'gather-bleed' proves Startup bleeds
      # pre-existing LATERAL velocity via the SAME hybrid-gather model the
      # burst family already uses (#198), not an instant stop — a
      # harness-asserted momentum profile matched against the exact
      # production formula. 'heading-turn' proves the drive line resolves via
      # the bounded turn-rate HeadingMath.RotateToward path (ADR-0010) — NOT
      # an instant snap to the rim — matched tick-for-tick against the SAME
      # production function. 'gather-to-layup-chain' proves the completed
      # drive-gather plants the holder inside #229's LayupRange and that a
      # REAL Layup, begun through the SAME BeginCommittedMove choke point,
      # actually launches from there. 'dead-dribble-gate' proves DriveGather
      # respects the SAME #193 Held-holder gate Crossover/Hesitation/
      # BehindTheBack/BetweenTheLegs/RetreatDribble already do (code-review
      # fix). Each exits 0=PASS/1=FAIL (ADR-0016).
      - name: Run drive-gather harness
        run: |
          godot --headless --path . res://tests/integration/DriveGatherTest.tscn -- --harness-scenario=gather-bleed
          godot --headless --path . res://tests/integration/DriveGatherTest.tscn -- --harness-scenario=heading-turn
          godot --headless --path . res://tests/integration/DriveGatherTest.tscn -- --harness-scenario=gather-to-layup-chain
          godot --headless --path . res://tests/integration/DriveGatherTest.tscn -- --harness-scenario=dead-dribble-gate

      # Dual-instance harness, increment 1: two headless Godot processes complete
      # a real ENet handshake over localhost. The orchestrator launches a server
      # and a client of the same scene and reads the client's exit code. This is
      # the two-process capability the single-instance smoke test cannot cover —
      # the foundation the server-authoritative verifies (ADR-0002) build on.
      - name: Run dual-instance ENet handshake harness
        run: |
          chmod +x tests/integration/run-net-handshake.sh
          tests/integration/run-net-handshake.sh godot

      # Dual-instance harness, increment 2: the server (multiplayer authority)
      # broadcasts a strictly-increasing authoritative value to the client every
      # physics tick via RPC — the same ReceiveState cadence the real sim uses
      # (ADR-0002). The client passes only after receiving a sustained in-order
      # run, proving authoritative state actually crosses the wire, not just the
      # handshake. This is the mechanism every server-authoritative verify needs.
      - name: Run dual-instance authoritative state-sync harness
        run: |
          chmod +x tests/integration/run-net-state-sync.sh
          tests/integration/run-net-state-sync.sh godot

      # Dual-instance harness, increment 3: the SHIPPED netcode end-to-end. The
      # server boots via NetworkManager.StartDedicatedServer (the headless
      # authoritative-host path, ADR-0007, never before proven on CI — issue #32);
      # the client joins via NetworkManager.JoinGame; the server's SpawnPlayer +
      # the sibling MultiplayerSpawner replicate a server-authored player node to
      # the client, named by peer id (the identity contract). The client passes
      # only once it observes its own node appear. This is the existence-replication
      # channel every server-authoritative dual-instance verify builds on, proven
      # against the real game's NetworkManager rather than throwaway harness code.
      - name: Run dual-instance node-replication harness
        run: |
          chmod +x tests/integration/run-net-node-replication.sh
          tests/integration/run-net-node-replication.sh godot

      # Dual-instance harness: BehindTheBack broadcast-driven shielded sweep
      # (issue #212). The single-instance BehindTheBackTest cannot reach
      # PlayerController.DisplayMoveId()'s _serverMoveId branch — in one
      # process Multiplayer.IsServer() is unconditionally true, so every node
      # reads its LIVE local machine. Here the server (listen-server via
      # NetworkManager.HostGame, so it owns holder node "1") begins a real
      # BehindTheBack; the CLIENT process passes only if, on the SAME
      # live-sweep tick, its own locally-rendered ball flags the sweep
      # behind-body, the remote holder's DisplayMoveId() returns
      # "behindtheback" (the broadcast branch — the client's copy of the
      # opponent never advances a local machine), and the ball's forward
      # offset goes genuinely NEGATIVE behind the holder's centerline. The
      # client's exit code is the verdict (ADR-0016).
      - name: Run dual-instance behind-the-back sweep harness
        run: |
          chmod +x tests/integration/run-net-behindtheback-sweep.sh
          tests/integration/run-net-behindtheback-sweep.sh godot

      # Dual-instance harness: defensive move telegraph + whiff-punish "beaten"
      # cue remote-display sync (issue #102). Proves TWO things the single-
      # instance StealTurnoverTest/BlowByWindowTest structurally cannot: (1)
      # the #69 remote-display fix (DisplayPhaseResolver) also covers a
      # DEFENSIVE committed move — a StealMove's Startup→Active→Recovery arc
      # rendering on a genuine remote client via DisplayMove(), not just the
      # dribble-move family already proven by the BehindTheBack sweep harness
      # above; and (2) the NEW BeatenDisplayResolver/isBeaten broadcast field
      # actually reaches a true remote client's DisplayBeaten() — a narrower
      # predicate than DisplayPhaseResolver's (only the server ever judges a
      # whiff, so even the CLIENT's OWN player must read the broadcast, not
      # just the opponent's). "telegraph": server begins a real StealMove on
      # its own player 1 (ball left Held, so ResolveStealAttempts never runs —
      # a guaranteed natural whiff) and the client must observe the full
      # ordered arc plus the beaten flag, all broadcast-derived, on a process
      # where Multiplayer.IsServer() is false. "control": identical topology,
      # no move ever begun — the client must NEVER observe a non-Inactive
      # phase or DisplayBeaten()==true, the counterfactual proving
      # "telegraph"'s positives are a real effect of the committed move.
      - name: Run dual-instance defensive telegraph harness (telegraph)
        run: |
          chmod +x tests/integration/run-net-defensive-telegraph.sh
          tests/integration/run-net-defensive-telegraph.sh godot telegraph

      - name: Run dual-instance defensive telegraph harness (control)
        run: |
          chmod +x tests/integration/run-net-defensive-telegraph.sh
          tests/integration/run-net-defensive-telegraph.sh godot control

      # Dual-instance harness: exit-vector RPC divergence fix (issue #210).
      # TickClientOwnPlayer (where the new RequestExitVector send site lives)
      # only ever runs on a role that is "!IsServer && IsLocalPlayer" —
      # structurally unreachable in a single offline instance, where
      # Multiplayer.IsServer() is unconditionally true. The CLIENT here drives
      # a REAL Crossover through the unmodified production input path (a
      # genuine right-stick gesture via Input.ActionPress, no
      # BeginXForHarness seam involved for the move itself) and holds a real,
      # distinct left-stick exit direction. The SERVER carries the verdict
      # (a deliberate deviation from this repo's other dual-instance
      # scripts — see NetExitVectorRpcTest.cs's class doc for why). "poisoned":
      # the server's _pendingRawStick is continuously poisoned to the
      # OPPOSITE decoy direction throughout the run — the actual regression
      # proof, since pre-#210 code read that field directly and would have
      # composed the decoy. "steady": no poisoning — the paired control,
      # proving the ordinary unpoisoned path is unaffected.
      - name: Run dual-instance exit-vector RPC harness (poisoned)
        run: |
          chmod +x tests/integration/run-net-exitvector-rpc.sh
          tests/integration/run-net-exitvector-rpc.sh godot poisoned

      - name: Run dual-instance exit-vector RPC harness (steady)
        run: |
          chmod +x tests/integration/run-net-exitvector-rpc.sh
          tests/integration/run-net-exitvector-rpc.sh godot steady
