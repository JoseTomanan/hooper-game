      # per scenario by temporarily reverting the fix (PR body has the
      # transcript): 'out-of-order' FAILED (HasDribbled stayed false) on the
      # reverted code while both controls stayed green regardless. Exit
      # 0=PASS/1=FAIL (ADR-0016).
      - name: Run StepBack cradle-race harness (#253)
