      # (Begin processed while the SERVER's ball is Held, client reports it was
      # ALREADY Dribbling) and asserts the gather converges to Held,
      # HasDribbled=true. 'in-order' is the paired control — drive first, then
      # Begin — proving the already-correct ordering's outcome (the normal,
      # non-no-op gather branch) is unchanged. 'no-drive-ever' is the triple-
      # threat preservation control: a StepBack from a genuine Held with no
      # drive ever (clientWasAlreadyDribbling=false) must NOT fabricate a
